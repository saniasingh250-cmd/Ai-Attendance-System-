<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Attendance Calendar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<style>

body{
background:#f4f7fc;
}

.sidebar{
width:250px;
height:100vh;
position:fixed;
background:#0f172a;
}

.sidebar h3{
color:white;
text-align:center;
padding:20px;
background:#1E3A8A;
}

.sidebar a{
display:block;
padding:15px 25px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#2563EB;
}

.content{
margin-left:250px;
padding:30px;
}

#calendar{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.legend{
margin-bottom:20px;
}

.legend span{
display:inline-block;
margin-right:20px;
font-weight:bold;
}

.present{
color:green;
}

.absent{
color:red;
}

</style>

</head>

<body>

<div class="sidebar">

<h3>Student Panel</h3>

<a href="{{ url_for('student.student_dashboard') }}">
<i class="fa fa-home"></i> Dashboard
</a>

<a href="{{ url_for('student.attendance_history') }}">
<i class="fa fa-clock"></i> Attendance History
</a>

<a href="{{ url_for('student.attendance_calendar') }}">
<i class="fa fa-calendar"></i> Attendance Calendar
</a>

<a href="{{ url_for('student.student_logout') }}">
<i class="fa fa-sign-out-alt"></i> Logout
</a>

</div>

<div class="content">

<h2 class="mb-4">
    <i class="fa fa-calendar"></i>
    Attendance Calendar
    </h2>

<div class="legend">

<span class="present">
    🟢 Present
</span>

<span class="absent">
    🔴 Absent
</span>

</div>

<div id="calendar"></div>

</div>

<script>

document.addEventListener('DOMContentLoaded', function () {

var calendarEl = document.getElementById('calendar');

var calendar = new FullCalendar.Calendar(calendarEl, {

initialView:'dayGridMonth',

height:700,

events: [

{% for row in attendance %}

{

title:'{{ row.status }}',

start:'{{ row.attendance_date }}',

color:'{% if row.status=="Present" %}green{% else %}red{% endif %}'

},

{% endfor %}

]

});

calendar.render();

});

</script>

</body>

</html>
