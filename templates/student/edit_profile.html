<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Edit Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

body{
    background:#eef2f7;
}

.container-box{
    max-width:900px;
    margin:40px auto;
    background:white;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    padding:35px;
}

.profile-img{
    width:170px;
    height:170px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #2563EB;
}

.form-control{
    border-radius:10px;
}

.btn{
    border-radius:10px;
    padding:10px 25px;
}

h2{
    color:#1E3A8A;
    font-weight:bold;
}

.readonly{
    background:#f1f5f9;
}

</style>

</head>

<body>

<div class="container-box">

<h2 class="text-center mb-4">

<i class="fa fa-user-edit"></i>

Edit Profile

</h2>

<form action="{{ url_for('student.update_student_profile') }}" method="POST" enctype="multipart/form-data">

<div class="row">

<div class="col-md-4 text-center">

{% if student.photo %}

<img
src="{{ url_for('static', filename='uploads/' + student.photo) }}"
class="profile-img"
id="preview">

{% else %}

<img
src="{{ url_for('static', filename='uploads/default.png') }}"
class="profile-img"
id="preview">

{% endif %}

<br><br>

<input
type="file"
class="form-control"
name="photo"
accept="image/*"
onchange="previewImage(event)">

</div>

<div class="col-md-8">

<div class="row">

<div class="col-md-6 mb-3">

<label>Name</label>

<input
type="text"
class="form-control readonly"
value="{{ student.name }}"
readonly>

</div>

<div class="col-md-6 mb-3">

<label>Roll Number</label>

<input
type="text"
class="form-control readonly"
value="{{ student.roll_no }}"
readonly>

</div>

<div class="col-md-6 mb-3">

<label>Department</label>

<input
type="text"
class="form-control readonly"
value="{{ student.department }}"
readonly>

</div>

<div class="col-md-6 mb-3">

<label>Semester</label>

<input
type="text"
class="form-control readonly"
value="{{ student.semester }}"
readonly>

</div>

<div class="col-md-6 mb-3">

<label>Email</label>

<input
type="email"
class="form-control"
name="email"
value="{{ student.email }}">

</div>

<div class="col-md-6 mb-3">

<label>Phone</label>

<input
type="text"
class="form-control"
name="phone"
value="{{ student.phone }}">

</div>

<div class="col-md-12 mb-3">

<label>Address</label>

<textarea
class="form-control"
rows="4"
name="address">{{ student.address }}</textarea>

</div>

</div>

<div class="text-center mt-4">

<button
class="btn btn-primary">

<i class="fa fa-save"></i>

Save Changes

</button>

<a
href="{{ url_for('student.student_dashboard') }}"
class="btn btn-success">

<i class="fa fa-arrow-left"></i>

Dashboard

</a>

</div>

</div>

</div>

</form>

</div>

<script>

function previewImage(event){

let img=document.getElementById("preview");

img.src=URL.createObjectURL(event.target.files[0]);

}

</script>

</body>

</html>
