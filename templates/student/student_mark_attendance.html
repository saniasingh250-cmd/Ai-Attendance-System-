<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mark Attendance</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#eef2f7;
}

.container{
    max-width:700px;
    margin:40px auto;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

video{

    width:100%;
    border-radius:15px;

}

canvas{

    display:none;

}

img{

    width:100%;
    margin-top:20px;
    border-radius:15px;

}

</style>

</head>

<body>

<div class="container">

<div class="card p-4">

<h2 class="text-center mb-4">

Mark Today's Attendance

</h2>

<form action="{{ url_for('student.submit_attendance_request') }}" method="POST">

    <video
    id="video"
    autoplay
    playsinline
    muted
    width="100%"
    height="400">
    </video>

    <canvas id="canvas" style="display:none;"></canvas>

    <br><br>

    <button type="button"
            onclick="captureImage()"
            class="btn btn-primary">

        Capture Image

    </button>

    <br><br>

    <img
    id="preview"
    class="img-thumbnail mt-3"
    style="display:none;max-height:400px;">

    <input type="hidden"
           id="photo"
           name="photo">

    <br><br>

    <button
     type="submit"
     class="btn btn-success w-100 mt-3">
     Submit Attendance
    </button>

</form>

<a
href="{{ url_for('student.student_dashboard') }}"
class="btn btn-secondary mt-3">

Back

</a>

</div>

</div>

</div>


<script>

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const preview = document.getElementById("preview");
    const photo = document.getElementById("photo");

    async function startCamera(){

    try{

        const stream = await navigator.mediaDevices.getUserMedia({

            video:{
                width:640,
                height:480,
                facingMode:"user"
            }

        });

        video.srcObject = stream;

        await video.play();

    }

    catch(err){

        alert("Camera cannot be opened.");

        console.log(err);

    }

    }

    startCamera();

    function captureImage(){

    if(video.videoWidth===0){

        alert("Camera is not ready yet.");

        return;

    }

    canvas.width=video.videoWidth;

    canvas.height=video.videoHeight;

    const ctx=canvas.getContext("2d");

    ctx.drawImage(video,0,0);

    const image = canvas.toDataURL("image/jpeg",0.4);

    preview.src=image;
    preview.style.display="block";

    

    photo.value=image;

    }

    document.querySelector("form").addEventListener("submit",function(e){

    if(photo.value===""){

        e.preventDefault();

        alert("Please capture image first.");

    }

});

</script>

</body>

</html>
