<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attendance History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.sidebar{
    width:250px;
    height:100vh;
    position:fixed;
    background:#0f172a;
}

.sidebar h3{
    color:white;
    text-align:center;
    padding:20px;
    background:#1E3A8A;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px 25px;
}

.sidebar a:hover{
    background:#2563EB;
}

.content{
    margin-left:250px;
    padding:30px;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.table th{
    background:#2563EB;
    color:white;
}

.badge-present{
    background:#22C55E;
    color:white;
    padding:7px 15px;
    border-radius:20px;
}

.badge-absent{
    background:#EF4444;
    color:white;
    padding:7px 15px;
    border-radius:20px;
}

</style>

</head>

<body>

<div class="sidebar">

<h3>Student Panel</h3>

<a href="{{ url_for('student.student_dashboard') }}">
<i class="fa fa-home"></i> Dashboard
</a>

<a href="{{ url_for('student.attendance_history') }}">
<i class="fa fa-clock"></i> Attendance History
</a>

<a href="{{ url_for('student.student_logout') }}">
<i class="fa fa-sign-out-alt"></i> Logout
</a>

</div>

<div class="content">

<h2 class="mb-4">
<i class="fa fa-clock"></i>
Attendance History
</h2>

<div class="card p-4">

<table class="table table-bordered table-hover">

<thead>

<tr>

<th>Date</th>

<th>Time</th>

<th>Status</th>

</tr>

</thead>

<tbody>

{% for row in attendance %}

<tr>

<td>{{ row.attendance_date }}</td>

<td>{{ row.attendance_time }}</td>

<td>

{% if row.status=="Present" %}

<span class="badge-present">

Present

</span>

{% else %}

<span class="badge-absent">

Absent

</span>

{% endif %}

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</body>
</html>
