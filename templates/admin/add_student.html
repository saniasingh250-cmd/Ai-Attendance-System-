<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Student</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#eef2f7;
}

.container{
max-width:900px;
margin:40px auto;
background:#fff;
padding:35px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#1E3A8A;
margin-bottom:30px;
}

form{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

.input-group{
display:flex;
flex-direction:column;
}

.input-group label{
margin-bottom:8px;
font-weight:600;
color:#444;
}

.input-group input,
.input-group select,
.input-group textarea{
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
}

textarea{
resize:none;
height:90px;
}

.full{
grid-column:1/3;
}

.photo-box{
grid-column:1/3;
text-align:center;
margin-top:20px;
}

.photo-preview{
width:170px;
height:170px;
border:2px dashed #2563EB;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
margin:auto;
overflow:hidden;
background:#f5f5f5;
}

.photo-preview img{
width:100%;
height:100%;
object-fit:cover;
display:none;
}

.photo-preview span{
color:#888;
}

.photo-box input{
margin-top:15px;
}

.buttons{
grid-column:1/3;
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

button{
padding:13px 30px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
color:white;
}

.save{
background:#2563EB;
}

.save:hover{
background:#1D4ED8;
}

.reset{
background:#EF4444;
}

.reset:hover{
background:#DC2626;
}

.back{
background:#22C55E;
text-decoration:none;
padding:13px 30px;
color:white;
border-radius:8px;
}

.back:hover{
background:#16A34A;
}

</style>

</head>

<body>

<div class="container">

<h1><i class="fa fa-user-plus"></i> Add New Student</h1>

<form action="{{ url_for('admin.save_student') }}" method="POST" enctype="multipart/form-data">

<div class="alert alert-info">

Student ID will be generated automatically.

</div>

<div class="input-group">
<label>Student Name</label>
<input type="text" name="name" required>
</div>

<div class="mb-3">
<label class="form-label">Department</label>

<select
name="department"
id="department"
class="form-select"
required
onchange="loadCourses()">

<option value="">Select Department</option>

<option value="Engineering">Engineering</option>
<option value="Science">Science</option>
<option value="Arts">Arts</option>
<option value="Commerce">Commerce</option>
<option value="Management">Management</option>
<option value="Education">Education</option>
<option value="Law">Law</option>

</select>
</div>
<div class="mb-3">

<label class="form-label">

Course

</label>

<select
name="course"
id="course"
class="form-select"
required>

<option value="">Select Course</option>

</select>

</div>

<div class="input-group">
<label>Semester</label>
<select name="semester">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
</select>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" name="email">
</div>

<div class="input-group">
<label>Phone</label>
<input type="text" name="phone">
</div>

<div class="input-group full">
<label>Address</label>
<textarea name="address"></textarea>
</div>

<div class="photo-box">

<div class="photo-preview">

<img id="preview">

<span id="text">Student Photo</span>

</div>

<input type="file"
name="photo"
accept=".jpg,.jpeg,.png"
onchange="previewImage(event)">

</div>

<div class="buttons">

<button class="save" type="submit">
<i class="fa fa-save"></i> Save Student
</button>

<button class="reset" type="reset">
<i class="fa fa-rotate-left"></i> Reset
</button>

<a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary">
<i class="fa fa-arrow-left"></i> DASHBOARD
</a>

</div>

</form>

</div>

<script>

function previewImage(event){

let img=document.getElementById("preview");

let text=document.getElementById("text");

img.src=URL.createObjectURL(event.target.files[0]);

img.style.display="block";

text.style.display="none";

}


const courses={

Engineering:[
"B.Tech",
"Diploma",
"M.Tech"
],

Science:[
"B.Sc",
"M.Sc"
],

Arts:[
"B.A",
"M.A"
],

Commerce:[
"B.Com",
"M.Com"
],

Management:[
"BBA",
"MBA"
],

Education:[
"B.Ed",
"M.Ed"
],

Law:[
"LLB",
"BA LLB",
"BBA LLB",
"LLM"
]

};

function loadCourses(){

let dep=document.getElementById("department").value;

let course=document.getElementById("course");

course.innerHTML="<option value=''>Select Course</option>";

if(courses[dep]){

courses[dep].forEach(function(c){

course.innerHTML+=`<option value="${c}">${c}</option>`;

});

}

}


</script>

</body>
</html>
